version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: wdp301-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - wdp301-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: wdp301-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LOG4J_ROOT_LOGLEVEL: 'ERROR'
      KAFKA_LOG4J_LOGGERS: 'org.apache.kafka.image.loader.MetadataLoader=ERROR,org.apache.kafka=ERROR,kafka=ERROR,state.change.logger=ERROR,kafka.log.LogCleaner=ERROR'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - wdp301-network

  backend:
    image: node:20-alpine
    container_name: wdp301-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:29092
      - TS_NODE_TRANSPILE_ONLY=true
    command: sh -c "npm install --no-audit --no-fund --quiet && npm run dev:all"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - wdp301-network

  frontend:
    image: node:20-alpine
    container_name: wdp301-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install --no-audit --no-fund --quiet && npm run dev"
    depends_on:
      - backend
    networks:
      - wdp301-network

  ai-service:
    build:
      context: ./backend/apps/ai-service
    container_name: wdp301-ai-service
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
      - "6006:6006"
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    networks:
      - wdp301-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: wdp301-qdrant
    ports:
      - "6333:6333"
    environment:
      - RUST_LOG=error
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - wdp301-network

networks:
  wdp301-network:
    driver: bridge

volumes:
  qdrant_data:

