apiVersion: v1
kind: Service
metadata:
  name: my-kafka
  namespace: kafka
spec:
  ports:
  - port: 9092
    name: tcp-kafka
    targetPort: 9092
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-kafka
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/confluent-local:7.5.0
        ports:
        - containerPort: 9092
        - containerPort: 9093
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "800m"
            memory: "1536Mi"
        env:
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
        # FIX: Dùng DNS của K8s Service thay vì 127.0.0.1
        # 127.0.0.1 chỉ work trong cùng 1 pod — các pod khác không kết nối được
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://my-kafka.kafka.svc.cluster.local:9092"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@localhost:9093"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"
        # Giới hạn JVM heap để giảm RAM usage
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512m -Xms256m"
