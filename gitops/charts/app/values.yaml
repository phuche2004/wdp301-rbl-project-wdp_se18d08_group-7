# ─────────────────────────────────────────────────────────────
# Default values — overridden per environment in overlays/
# ─────────────────────────────────────────────────────────────

# Global settings
global:
  environment: dev
  domain: wdp301.local
  imagePullPolicy: IfNotPresent

# ─────────────────────────────────────────────────────────────
# Frontend (Next.js)
# ─────────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: wdp301-frontend
    tag: "latest"
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  env:
    NEXT_PUBLIC_API_URL: "http://backend-svc:4000"
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 5
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 15
    periodSeconds: 15
    failureThreshold: 5
    timeoutSeconds: 5

# ─────────────────────────────────────────────────────────────
# Microservices (Split Backend)
# ─────────────────────────────────────────────────────────────
gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: wdp301-backend
    tag: "latest"
  service:
    type: ClusterIP
    port: 4000
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "800m"
      memory: "512Mi"
  env:
    NODE_ENV: "production"
    PORT: "4000"
    APP_VERSION: "1.0.0"
    KAFKA_BROKERS: "my-kafka.kafka.svc.cluster.local:9092"
    KAFKA_GROUP_ID: "wdp301-consumers"
    MONGODB_URI: "mongodb://mongodb-svc:27017/wdp301-dev"
    NODE_OPTIONS: "--max-old-space-size=384"
  livenessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 90
    periodSeconds: 30
    failureThreshold: 5
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /health
      port: 4000
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 5
    timeoutSeconds: 5

