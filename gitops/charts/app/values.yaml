# ─────────────────────────────────────────────────────────────
# MongoDB
# ─────────────────────────────────────────────────────────────
mongodb:
  enabled: true
  image:
    repository: mongo
    tag: "7.0"
  service:
    port: 27017
  storage:
    size: 5Gi
    storageClass: "standard"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  auth:
    enabled: false  # Enable with secrets in prod

# ─────────────────────────────────────────────────────────────
# Ingress
# ─────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
  hosts:
    - host: wdp301.local
      paths:
        - path: /api
          pathType: Prefix
          serviceName: backend-svc
          servicePort: 4000
        - path: /health
          pathType: Prefix
          serviceName: backend-svc
          servicePort: 4000
        - path: /
          pathType: Prefix
          serviceName: frontend-svc
          servicePort: 3000
  tls: []
